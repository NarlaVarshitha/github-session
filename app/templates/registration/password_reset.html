<!DOCTYPE html>
<html>
<head>
  <title>Reset Password | Eco-Pack</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e0f7ec;
      padding: 30px;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      color: #2e7d32;
    }
    button {
      background-color: #2e7d32;
      color: white;
      padding: 10px 20px;
      border: none;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #256b2f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Forgot Your Password?</h2>
    <p>Enter your email to get a password reset link:</p>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Send Reset Link</button>
    </form>
  </div>
</body>
</html>
