<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Success</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #e6f2ea;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            margin: 100px auto;
            background-color: #ffffff;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in-out;
            position: relative;
            z-index: 2;
        }

        h1 {
            color: #2e8b57;
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .checkmark {
            font-size: 60px;
            color: #2ecc71;
            margin-bottom: 20px;
            animation: popIn 0.6s ease;
        }

        .home-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #2e8b57;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .home-btn:hover {
            background-color: #256f45;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Confetti Styles */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: red;
            opacity: 0.7;
            top: -10px;
            animation: fall 3s linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotateZ(360deg);
                opacity: 0;
            }
        }
        .btn-primary {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #218838;
        }

        .btn-secondary {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="checkmark">✔️</div>
    <h1>Thank You!</h1>
    <p>Your order has been placed successfully. We’ll keep you updated on the delivery status.</p>
    <a href="{% url 'products' %}" class="home-btn">Continue Shopping</a>
</div>
<div class="extra-actions">
    <button class="btn-secondary" onclick="window.location.href='{% url 'order_tracking' %}'">
        📦 Track My Order
    </button>
    <button class="btn-secondary" onclick="downloadPDF()">
        🧾 Download Receipt (PDF)
    </button>
</div>
<script>
    // Simple Confetti Generator 🎉
    function createConfettiPiece() {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');

        const colors = ['#ff3b3f', '#ffbe0b', '#3a86ff', '#8338ec', '#06d6a0'];
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
        confetti.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
        document.body.appendChild(confetti);

        // Remove after animation
        setTimeout(() => confetti.remove(), 4000);
    }

    // Launch multiple confetti pieces
    for (let i = 0; i < 80; i++) {
        setTimeout(createConfettiPiece, i * 100);
    }


    function showPaymentDetails(method) {
        document.querySelectorAll('.payment-details').forEach(el => el.style.display = 'none');
        const selected = document.getElementById(method);
        if (selected) selected.style.display = 'block';
    }

    

    function downloadPDF() {
        alert("🔖 This will download the PDF receipt. (Backend functionality to be implemented)");
        // You can implement using Django view + xhtml2pdf later
    }
</script>

</body>
</html>
